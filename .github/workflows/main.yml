name: Generate Snake Animation

on:
  # Uruchamia skrypt automatycznie co 24 godziny
  schedule:
    - cron: "0 0 * * *"
  
  # Pozwala na ręczne uruchomienie skryptu w zakładce Actions
  workflow_dispatch:
  
  # Uruchamia skrypt przy każdym pushu do gałęzi głównej
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generowanie animacji węża z wykresu aktywności użytkownika github
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Wrzucenie wygenerowanych plików na specjalną gałąź output
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
